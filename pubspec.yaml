name: phro
description: "A General Agent"
publish_to: 'none'
version: 0.2.0+2
license: Apache-2.0

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.5
  yaml: ^3.1.3
  yaml_writer: ^2.1.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  uuid: ^4.5.3
  http: ^1.6.0
  html2md: ^1.3.2
  flutter_highlighter: ^0.1.1
  highlight: ^0.7.0
  markdown: ^7.3.1
  flutter_riverpod: ^3.3.1
  gpt_markdown: ^1.1.7
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  pretty_diff_text: ^2.1.0
  platform_proxy: ^0.9.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5
  hive_ce_test: ^2.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/phro_icon.png"

  windows:
    generate: true
    image_path: "assets/icons/phro_icon.png"
    icon_size: 256